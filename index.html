<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brody Hops! || Official</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: #13131a;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --muted-text: #8b8b9f;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #00ffcc, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .tagline {
            color: var(--muted-text);
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .main-card {
            background-color: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #00ffcc, #0077ff);
        }

        .status-badge {
            display: inline-block;
            background: rgba(0, 255, 204, 0.1);
            color: var(--accent-color);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        p {
            color: var(--muted-text);
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .cta-btn {
            background: linear-gradient(135deg, #00ffcc, #0077ff);
            color: #000000;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 204, 0.5);
        }

        .cta-btn:active {
            transform: translateY(0);
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Brody Hops!</h1>
        <div class="tagline">Next-Generation Dashboard & Project Hub</div>
    </header>

    <main>
        <div class="main-card">
            <div class="status-badge">Deployment Active</div>
            <p>Welcome to the central network terminal. Code infrastructure and custom assets are initializing framework protocols.</p>
            <button class="cta-btn" onclick="console.log('Launch sequence initiated.')">Launch Project Control</button>
        </div>
    </main>

    <footer>
        &copy; 2026 Brody Hops! Network. All rights reserved.
    </footer>
</div>

</body>
</html>
