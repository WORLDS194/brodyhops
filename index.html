<html>
<head>
<title>Brody's Site</title>
<style>
body {
  background-color: black;
  margin: 0;
  
  /* Flexbox settings */
  display: flex;
  flex-direction: column;  /* Stacks elements vertically instead of side-by-side */
  justify-content: center; /* Centers the whole stack vertically */
  align-items: center;     /* Centers the whole stack horizontally */
  
  /* Sizing and spacing */
  height: 100vh;           /* Takes up the full height of the viewport */
  padding: 20px;           /* Keeps content safe from the screen edges on mobile */
  box-sizing: border-box;  /* Ensures padding doesn't break the 100vh height */
}

h1, h2, p {
  color: white;
  text-align: center;      /* Centers the text lines individually */
  margin: 10px 0;          /* Controls the vertical spacing between your elements */
}
    
.cta-button {
    display: inline-block;     /* Allows padding and width settings on a link */
    text-decoration: none;     /* Removes the default link underline */
    background-color: white;
    color: black;
    padding: 12px 24px;
    border: 2px solid white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    text-align: center;
    transition: all 0.3s ease; /* Smooth color change */
}

/* Hover effect */
.cta-button:hover {
    background-color: transparent;
    color: white;
}

  .trail-particle {
    position: fixed;
    top: 0;
    left: 0;
    width: 12px;
    height: 12px;
    background-color: #ff0000; /* Bright blue neon particle */
    border-radius: 50%;
    pointer-events: none; /* Allows user to click "through" the particles */
    transform: translate(-50%, -50%);
    animation: fadeAndShrink 0.6s ease-out forwards;
    z-index: 9999;
}

/* Particle animation to shrink and vanish */
@keyframes fadeAndShrink {
    0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.1);
    }
}


</style>
</head>
<body>
<h1>Welcome to Brodys Site!</h1>
<p>This is a awesome site hand-made! Except for CSS i got some help from AI a little bit. I only dont know CSS but i know html!</p>
<a href="https://youtube.com/@brodyhops" class="cta-button">YT Channel</a>

<img src="https://cdn.create.vista.com/api/media/small/193020284/stock-photo-smiling-builder-orange-overall-hard-hat-using-digital-tablet-isolated" alt="Me BTW" class="site-image">

<script>document.addEventListener('mousemove', (e) => {
    // Create the particle element
    const particle = document.createElement('div');
    particle.className = 'trail-particle';
    
    // Position the particle at the current mouse coordinates
    particle.style.left = `${e.clientX}px`;
    particle.style.top = `${e.clientY}px`;
    
    // Append the particle to the body
    document.body.appendChild(particle);
    
    // Clean up the DOM element after the CSS animation ends (600ms)
    setTimeout(() => {
        particle.remove();
    }, 600);
});
</script>
    
</body>
</html>
